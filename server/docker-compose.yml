services:
  app:
    build: .
    restart: always
    environment:
      - API_KEY=${API_KEY}
      - DB_PATH=/data/logs.db
    volumes:
      - db_data:/data

  whisper:
    build:
      context: .
      dockerfile: Dockerfile.whisper
    restart: always
    environment:
      - FASTER_WHISPER_MODEL_SIZE_OR_PATH=${WHISPER_MODEL:-tiny}
      - WHISPER_CPU_THREADS=4
    volumes:
      - whisper_cache:/root/.cache

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
      - whisper

volumes:
  db_data:
  caddy_data:
  caddy_config:
  whisper_cache:
